# Container provisioning via containers.podman.podman connection plugin.
#
# Creates a Toolbx or Distrobox container, registers it with add_host,
# then provisions it using standard Ansible modules over the podman
# connection.  Requires: containers.podman collection installed
# (ansible-galaxy collection install containers.podman).
#
# Expected facts (set by csb_detect.yml):
#   toolbox_installed, distrobox_installed
#
# Variables (from defaults/main.yml or passed in):
#   container_name:  fedora-dev
#   container_image: registry.fedoraproject.org/fedora-toolbox:42
#   container_distro: fedora
#   container_release: "42"
#   distrobox_ini_path: "{{ ansible_user_dir }}/.config/distrobox/distrobox.ini"
#
# Binary versions (pin for reproducibility):
#   oc_version:    "stable"
#   kubectl_version: (derived from oc tarball)
#   grype_version: "latest"
#
# Host-exec commands to symlink (Distrobox) or alias (Toolbx):
#   host_exec_commands:
#     - podman
#     - docker
#     - flatpak

---

# =========================================================================
# 1. Detect which container tool is available
# =========================================================================
- name: Detect container tool availability
  block:
    - name: Check for distrobox binary
      ansible.builtin.command:
        cmd: which distrobox
      register: _distrobox_check
      changed_when: false
      failed_when: false

    - name: Check for toolbox binary
      ansible.builtin.command:
        cmd: which toolbox
      register: _toolbox_check
      changed_when: false
      failed_when: false

    - name: Set container tool facts
      ansible.builtin.set_fact:
        _use_distrobox: "{{ _distrobox_check.rc == 0 }}"
        _use_toolbox: "{{ _distrobox_check.rc != 0 and _toolbox_check.rc == 0 }}"
        _container_tool: >-
          {{ 'distrobox' if (_distrobox_check.rc == 0)
             else ('toolbox' if (_toolbox_check.rc == 0)
             else 'none') }}

    - name: Fail if no container tool available
      ansible.builtin.fail:
        msg: >-
          Neither distrobox nor toolbox found.  Install one:
            EPEL:  sudo dnf install distrobox
            RHEL:  sudo dnf install toolbox
      when: _container_tool == 'none'

    - name: Report selected container tool
      ansible.builtin.debug:
        msg: "Using {{ _container_tool }} to manage container '{{ container_name }}'"

# =========================================================================
# 2. Check whether the container already exists (idempotency)
# =========================================================================
- name: Check if container already exists
  ansible.builtin.command:
    cmd: podman container exists {{ container_name }}
  register: _container_exists
  changed_when: false
  failed_when: false

# =========================================================================
# 3. Create the container (only if it does not exist)
# =========================================================================

# --- Distrobox path ---
- name: Create container via Distrobox
  when:
    - _use_distrobox | bool
    - _container_exists.rc != 0
  block:
    - name: Ensure distrobox config directory exists
      ansible.builtin.file:
        path: "{{ distrobox_ini_path | dirname }}"
        state: directory
        mode: "0755"

    - name: Deploy distrobox.ini manifest
      ansible.builtin.template:
        src: distrobox.ini.j2
        dest: "{{ distrobox_ini_path }}"
        mode: "0644"

    - name: Create container with distrobox assemble
      ansible.builtin.command:
        cmd: >-
          distrobox assemble create
          --file {{ distrobox_ini_path }}
      register: _distrobox_create
      changed_when: "'already exists' not in (_distrobox_create.stderr | default(''))"

# --- Toolbx path ---
- name: Create container via Toolbx
  when:
    - _use_toolbox | bool
    - _container_exists.rc != 0
  block:
    - name: Create Toolbx container
      ansible.builtin.command:
        cmd: >-
          toolbox create
          --container {{ container_name }}
          --distro {{ container_distro }}
          --release {{ container_release }}
      register: _toolbox_create
      changed_when: _toolbox_create.rc == 0

# =========================================================================
# 4. Start the container and register it with add_host
# =========================================================================
- name: Ensure container is running
  ansible.builtin.command:
    cmd: podman start {{ container_name }}
  register: _container_start
  changed_when: "'already running' not in (_container_start.stderr | default(''))"
  failed_when:
    - _container_start.rc != 0
    - "'already running' not in (_container_start.stderr | default(''))"
    - "'already started' not in (_container_start.stderr | default(''))"

# Probe for python3 inside the container so we can set the interpreter.
- name: Detect Python interpreter inside container
  ansible.builtin.command:
    cmd: >-
      podman exec {{ container_name }}
      sh -c 'command -v python3 || command -v python'
  register: _container_python
  changed_when: false
  failed_when: _container_python.rc != 0

- name: Register container as Ansible host
  ansible.builtin.add_host:
    name: "{{ container_name }}"
    groups:
      - containers
    ansible_connection: containers.podman.podman
    # The connection plugin uses this as the container name/ID.
    ansible_host: "{{ container_name }}"
    # Python path detected above (typically /usr/bin/python3 on Fedora).
    ansible_python_interpreter: "{{ _container_python.stdout | trim }}"
    # Temp dir that does not depend on user home (container may lack it
    # during early bootstrap).
    ansible_remote_tmp: /tmp/.ansible/tmp

# =========================================================================
# 5. Install packages inside the container via the connection plugin
# =========================================================================
# This play targets the dynamically-added host.  In a real playbook this
# would be a separate play with "hosts: containers".  Here we show the
# tasks as an include that the calling play delegates.

- name: Install packages inside container
  delegate_to: "{{ container_name }}"
  block:
    - name: Ensure Python 3 is installed (bootstrap)
      ansible.builtin.raw: dnf install -y python3 python3-dnf
      changed_when: true
      # raw module does not need a Python interpreter.

    - name: Install development packages via dnf
      ansible.builtin.dnf:
        name: "{{ container_packages }}"
        state: present
      vars:
        container_packages:
          - gcc
          - gcc-c++
          - clang
          - make
          - cmake
          - golang
          - python3
          - python3-pip
          - python3-devel
          - nodejs
          - npm
          - git
          - vim
          - tmux
          - zsh
          - jq
          - fzf
          - direnv
          - curl
          - wget
          - tar
          - unzip
          - ShellCheck
          - yamllint
          - ripgrep
          - fd-find
          - procps-ng
          - findutils
          - which
          - hostname
          - bash-completion
          - buildah
          - skopeo

# =========================================================================
# 6. Install binary downloads (oc, kubectl, grype) inside the container
# =========================================================================
- name: Install binary tools inside container
  delegate_to: "{{ container_name }}"
  block:
    - name: Create /usr/local/bin if absent
      ansible.builtin.file:
        path: /usr/local/bin
        state: directory
        mode: "0755"

    # --- oc + kubectl (bundled in the same tarball) ---
    - name: Check if oc is already installed
      ansible.builtin.command:
        cmd: /usr/local/bin/oc version --client
      register: _oc_installed
      changed_when: false
      failed_when: false

    - name: Download and install oc + kubectl
      when: _oc_installed.rc != 0
      block:
        - name: Download OpenShift client tarball
          ansible.builtin.get_url:
            url: "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/{{ oc_version | default('stable') }}/openshift-client-linux.tar.gz"
            dest: /tmp/openshift-client-linux.tar.gz
            mode: "0644"

        - name: Extract oc and kubectl
          ansible.builtin.unarchive:
            src: /tmp/openshift-client-linux.tar.gz
            dest: /usr/local/bin
            remote_src: true
            extra_opts:
              - --no-same-owner
            creates: /usr/local/bin/oc

        - name: Clean up tarball
          ansible.builtin.file:
            path: /tmp/openshift-client-linux.tar.gz
            state: absent

    # --- grype ---
    - name: Check if grype is already installed
      ansible.builtin.command:
        cmd: /usr/local/bin/grype version
      register: _grype_installed
      changed_when: false
      failed_when: false

    - name: Install grype via official installer
      ansible.builtin.shell:
        cmd: >-
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh
          | sh -s -- -b /usr/local/bin
        creates: /usr/local/bin/grype
      when: _grype_installed.rc != 0

# =========================================================================
# 7. Set up host-command delegation
#    Distrobox: distrobox-host-exec symlinks
#    Toolbx:    flatpak-spawn --host wrapper scripts
# =========================================================================
- name: Set up host command delegation (Distrobox path)
  delegate_to: "{{ container_name }}"
  when: _use_distrobox | bool
  block:
    - name: Create distrobox-host-exec symlinks
      ansible.builtin.file:
        src: /usr/bin/distrobox-host-exec
        dest: "/usr/local/bin/{{ item }}"
        state: link
        force: true
      loop: "{{ host_exec_commands | default(['podman', 'docker', 'flatpak']) }}"

- name: Set up host command delegation (Toolbx path)
  delegate_to: "{{ container_name }}"
  when: _use_toolbox | bool
  block:
    - name: Deploy flatpak-spawn wrapper scripts for host commands
      ansible.builtin.copy:
        dest: "/usr/local/bin/{{ item }}"
        mode: "0755"
        content: |
          #!/bin/sh
          # Wrapper to run '{{ item }}' on the host via flatpak-spawn.
          # Generated by Ansible -- do not edit.
          exec flatpak-spawn --host {{ item }} "$@"
      loop: "{{ host_exec_commands | default(['podman', 'docker', 'flatpak']) }}"

# =========================================================================
# 8. Verify the container is usable
# =========================================================================
- name: Verify container provisioning
  delegate_to: "{{ container_name }}"
  block:
    - name: Confirm Python works inside container
      ansible.builtin.command:
        cmd: python3 --version
      changed_when: false

    - name: Confirm oc is available
      ansible.builtin.command:
        cmd: /usr/local/bin/oc version --client
      changed_when: false
      failed_when: false

    - name: Confirm host delegation works
      ansible.builtin.command:
        cmd: /usr/local/bin/podman --version
      changed_when: false
      failed_when: false
      register: _host_podman

    - name: Report provisioning summary
      ansible.builtin.debug:
        msg: |
          === Container Provisioning Summary ===
          Container tool   : {{ _container_tool }}
          Container name   : {{ container_name }}
          Python interpreter: {{ _container_python.stdout | trim }}
          Host podman      : {{ _host_podman.stdout | default('not available') | trim }}
          ======================================
