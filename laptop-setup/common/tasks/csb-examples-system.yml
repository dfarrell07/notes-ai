# Example: system role — sysctl settings and firewall rules
#
# On RHEL CSB, system-level changes may be blocked by:
#   - No sudo / restricted sudo
#   - STIG-managed sysctl values that override user settings
#   - Centrally managed firewalld policies (locked zones)
#   - SELinux preventing sysctl writes

---
# ──────────────────────────────────────────────────────────────────
# Sysctl: increase inotify limits for kind/Kubernetes development
# ──────────────────────────────────────────────────────────────────
- name: Set inotify sysctl values for Kubernetes development
  block:
    - name: Set fs.inotify.max_user_watches
      ansible.posix.sysctl:
        name: fs.inotify.max_user_watches
        value: "524288"
        sysctl_file: /etc/sysctl.d/90-developer.conf
        reload: true
        state: present
      become: true

    - name: Set fs.inotify.max_user_instances
      ansible.posix.sysctl:
        name: fs.inotify.max_user_instances
        value: "512"
        sysctl_file: /etc/sysctl.d/90-developer.conf
        reload: true
        state: present
      become: true

    - name: Verify sysctl values applied
      ansible.builtin.command:
        cmd: sysctl fs.inotify.max_user_watches fs.inotify.max_user_instances
      changed_when: false
      register: _sysctl_verify

    - name: Assert sysctl values are correct
      ansible.builtin.assert:
        that:
          - "'524288' in _sysctl_verify.stdout"
          - "'512' in _sysctl_verify.stdout"
        fail_msg: "sysctl values did not persist after reload"

  rescue:
    - name: Record sysctl failure
      ansible.builtin.include_tasks: common/tasks/csb-failure-handler.yml
      vars:
        _csb_role: system
        _csb_task_name: "Set inotify sysctl values"
        _csb_error: "{{ ansible_failed_result.msg | default(ansible_failed_result | to_nice_json) }}"
        _csb_action: >-
          inotify limits are required for kind clusters and file-watching
          tools (IDEs, build systems). Without them, kind nodes fail to
          start and inotify-based watchers silently drop events. File IT
          ticket. No user-space workaround exists for sysctl.
        _csb_ticket_summary: "Sysctl change: increase inotify limits for development"
        _csb_ticket_body: |
          ## Request
          Set the following sysctl values in /etc/sysctl.d/90-developer.conf:
            fs.inotify.max_user_watches = 524288
            fs.inotify.max_user_instances = 512

          ## Business Justification
          Default inotify limits (8192 watches, 128 instances) are
          insufficient for Kubernetes local development:
          - kind cluster nodes require ~50k watches each
          - IDEs (VS Code, GoLand) use inotify for file change detection
          - Build tools (make, go build) use inotify for incremental builds
          These values are standard on Fedora Workstation and recommended
          by the kind project documentation.

          ## Risk Assessment
          Read-only kernel parameter. No security implications. Only
          affects maximum number of filesystem watch descriptors per user.
          Adopted as default by Fedora, Ubuntu, and Arch Linux.

          ## Error Encountered
          {{ ansible_failed_result.msg | default('Unknown error') | truncate(500) }}
        _csb_ticket_priority: High
        _csb_ticket_category: "System Configuration"


# ──────────────────────────────────────────────────────────────────
# Sysctl: enable kernel.yama.ptrace_scope (security hardening)
# ──────────────────────────────────────────────────────────────────
- name: Harden ptrace scope
  block:
    - name: Set kernel.yama.ptrace_scope to 1
      ansible.posix.sysctl:
        name: kernel.yama.ptrace_scope
        value: "1"
        sysctl_file: /etc/sysctl.d/90-developer.conf
        reload: true
        state: present
      become: true

  rescue:
    - name: Check if ptrace_scope is already hardened by STIG
      ansible.builtin.command:
        cmd: sysctl -n kernel.yama.ptrace_scope
      changed_when: false
      register: _ptrace_current
      ignore_errors: true

    - name: Skip IT ticket if STIG already set ptrace_scope >= 1
      ansible.builtin.debug:
        msg: >-
          ptrace_scope is already {{ _ptrace_current.stdout | default('unknown') }}
          (likely set by STIG). No IT ticket needed.
      when: (_ptrace_current.stdout | default('0') | int) >= 1

    - name: Record ptrace_scope failure (only if not already hardened)
      ansible.builtin.include_tasks: common/tasks/csb-failure-handler.yml
      vars:
        _csb_role: system
        _csb_task_name: "Harden ptrace scope"
        _csb_error: "{{ ansible_failed_result.msg | default(ansible_failed_result | to_nice_json) }}"
        _csb_action: >-
          CSB STIG likely already sets this. Verify with
          'sysctl kernel.yama.ptrace_scope'. If already 1 or higher,
          no action needed.
        _csb_ticket_summary: "Sysctl: set kernel.yama.ptrace_scope = 1"
        _csb_ticket_body: |
          ## Request
          Ensure kernel.yama.ptrace_scope is set to 1 (restrict ptrace
          to parent processes only).

          ## Business Justification
          Prevents arbitrary process debugging/injection. This is a
          standard STIG control (RHEL-08-040121) and may already be
          applied by the CSB baseline.

          ## Error Encountered
          {{ ansible_failed_result.msg | default('Unknown error') | truncate(500) }}
        _csb_ticket_priority: Normal
        _csb_ticket_category: "System Configuration"
      when: (_ptrace_current.stdout | default('0') | int) < 1


# ──────────────────────────────────────────────────────────────────
# Firewall: set default zone to drop and allow essential ICMP
# ──────────────────────────────────────────────────────────────────
- name: Configure firewall drop zone
  block:
    - name: Set default firewall zone to drop
      ansible.posix.firewalld:
        zone: drop
        state: enabled
        permanent: true
        immediate: true
      become: true

    - name: Enable ICMP block inversion on drop zone
      ansible.builtin.command:
        cmd: firewall-cmd --permanent --zone=drop --add-icmp-block-inversion
      register: _icmp_inversion
      changed_when: "'ALREADY_ENABLED' not in _icmp_inversion.stderr"
      failed_when:
        - _icmp_inversion.rc != 0
        - "'ALREADY_ENABLED' not in _icmp_inversion.stderr"
      become: true

    - name: Allow essential ICMP types through drop zone
      ansible.builtin.command:
        cmd: "firewall-cmd --permanent --zone=drop --add-icmp-block={{ item }}"
      loop:
        - destination-unreachable
        - fragmentation-needed
        - time-exceeded
        - echo-reply
      register: _icmp_types
      changed_when: "'ALREADY_ENABLED' not in _icmp_types.stderr"
      failed_when:
        - _icmp_types.rc != 0
        - "'ALREADY_ENABLED' not in _icmp_types.stderr"
      become: true

    - name: Reload firewalld
      ansible.builtin.command:
        cmd: firewall-cmd --reload
      changed_when: true
      become: true

    - name: Verify default zone is drop
      ansible.builtin.command:
        cmd: firewall-cmd --get-default-zone
      changed_when: false
      register: _default_zone

    - name: Assert default zone
      ansible.builtin.assert:
        that:
          - _default_zone.stdout == 'drop'
        fail_msg: "Default zone is {{ _default_zone.stdout }}, expected 'drop'"

  rescue:
    - name: Record firewall configuration failure
      ansible.builtin.include_tasks: common/tasks/csb-failure-handler.yml
      vars:
        _csb_role: system
        _csb_task_name: "Configure firewall drop zone"
        _csb_error: "{{ ansible_failed_result.msg | default(ansible_failed_result | to_nice_json) }}"
        _csb_action: >-
          Firewall changes require root. On CSB the firewall is likely
          centrally managed with STIG-compliant settings. Verify current
          config with 'firewall-cmd --get-default-zone' and
          'firewall-cmd --list-all'. If already on drop zone, no action
          needed. If on public zone, file IT ticket.
        _csb_ticket_summary: "Firewall change: set default zone to drop with ICMP exceptions"
        _csb_ticket_body: |
          ## Request
          Change default firewalld zone from public to drop and configure
          essential ICMP types.

          ## Business Justification
          The 'public' zone allows ssh, mdns, and dhcpv6-client by default,
          which exposes unnecessary attack surface on a developer
          workstation. The 'drop' zone silently discards all unsolicited
          inbound traffic while allowing established connections.

          ## Specific Changes
          1. `firewall-cmd --set-default-zone=drop`
          2. Enable ICMP block inversion (allowlist mode)
          3. Allow these ICMP types (required for network functionality):
             - destination-unreachable (routing)
             - fragmentation-needed (PMTUD — prevents black-hole connections)
             - time-exceeded (traceroute diagnostics)
             - echo-reply (ping responses)

          ## Risk Assessment
          This is MORE restrictive than the default public zone. Aligns
          with STIG V-230505 (RHEL must configure firewalld to restrict
          network traffic). No services are opened; only essential ICMP
          for basic network functionality.

          ## Error Encountered
          {{ ansible_failed_result.msg | default('Unknown error') | truncate(500) }}
        _csb_ticket_priority: Normal
        _csb_ticket_category: "Network / Firewall"


# ──────────────────────────────────────────────────────────────────
# Firewall: add SSH on non-default port
# ──────────────────────────────────────────────────────────────────
- name: Configure SSH on non-default port
  block:
    - name: Add SELinux port label for SSH
      community.general.seport:
        ports: "{{ ssh_port }}"
        proto: tcp
        setype: ssh_port_t
        state: present
      become: true
      when: ansible_selinux.status == 'enabled'

    - name: Open SSH port in firewall drop zone
      ansible.posix.firewalld:
        port: "{{ ssh_port }}/tcp"
        zone: drop
        permanent: true
        immediate: true
        state: enabled
      become: true

    - name: Verify SSH port is open
      ansible.builtin.command:
        cmd: "firewall-cmd --zone=drop --query-port={{ ssh_port }}/tcp"
      changed_when: false

  rescue:
    - name: Record SSH firewall port failure
      ansible.builtin.include_tasks: common/tasks/csb-failure-handler.yml
      vars:
        _csb_role: system
        _csb_task_name: "Configure SSH on non-default port {{ ssh_port }}"
        _csb_error: "{{ ansible_failed_result.msg | default(ansible_failed_result | to_nice_json) }}"
        _csb_action: >-
          SSH port change requires both SELinux (semanage) and firewalld
          changes. On CSB, use Tailscale for SSH access instead (no
          firewall port needed — WireGuard handles transport). File IT
          ticket only if Tailscale is not available.
        _csb_ticket_summary: "Firewall/SELinux change: SSH on port {{ ssh_port }}"
        _csb_ticket_body: |
          ## Request
          Allow SSH on port {{ ssh_port }}/tcp:
          1. SELinux: `semanage port -a -t ssh_port_t -p tcp {{ ssh_port }}`
          2. Firewall: `firewall-cmd --permanent --zone=drop --add-port={{ ssh_port }}/tcp`

          ## Business Justification
          Non-default SSH port reduces automated bot traffic (noise
          reduction, not a security control). Port is below 1024
          (privileged) to prevent local attackers from binding if sshd
          stops. SSH uses FIDO2 hardware key authentication only
          (no passwords).

          ## Error Encountered
          {{ ansible_failed_result.msg | default('Unknown error') | truncate(500) }}
        _csb_ticket_priority: Normal
        _csb_ticket_category: "Network / Firewall"
