# Example: Two-play structure for container provisioning.
#
# Play 1 runs on localhost to create the container and register it.
# Play 2 targets the container via the podman connection plugin.
#
# This file is a standalone playbook example showing the canonical
# pattern.  The actual project uses include_tasks from site.yml.
#
# Usage:
#   ansible-playbook common/tasks/container-provision-play.yml
#
# Prerequisites:
#   ansible-galaxy collection install containers.podman

---
# =====================================================================
# Play 1: Create the container on localhost, register with add_host
# =====================================================================
- name: Provision container shell
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    container_name: fedora-dev
    container_image: "registry.fedoraproject.org/fedora-toolbox:42"
    container_distro: fedora
    container_release: "42"
    distrobox_ini_path: "{{ ansible_user_dir }}/.config/distrobox/distrobox.ini"
    oc_version: stable
    host_exec_commands:
      - podman
      - docker
      - flatpak

  tasks:
    # -----------------------------------------------------------------
    # 1. Detect which container tool is available
    # -----------------------------------------------------------------
    - name: Check for distrobox
      ansible.builtin.command:
        cmd: which distrobox
      register: _distrobox_check
      changed_when: false
      failed_when: false

    - name: Check for toolbox
      ansible.builtin.command:
        cmd: which toolbox
      register: _toolbox_check
      changed_when: false
      failed_when: false

    - name: Set container tool facts
      ansible.builtin.set_fact:
        _use_distrobox: "{{ _distrobox_check.rc == 0 }}"
        _use_toolbox: "{{ _distrobox_check.rc != 0 and _toolbox_check.rc == 0 }}"
        _container_tool: >-
          {{ 'distrobox' if (_distrobox_check.rc == 0)
             else ('toolbox' if (_toolbox_check.rc == 0)
             else 'none') }}

    - name: Fail if no container tool available
      ansible.builtin.fail:
        msg: "Neither distrobox nor toolbox found."
      when: _container_tool == 'none'

    # -----------------------------------------------------------------
    # 2. Idempotent container creation
    # -----------------------------------------------------------------
    - name: Check if container already exists
      ansible.builtin.command:
        cmd: podman container exists {{ container_name }}
      register: _container_exists
      changed_when: false
      failed_when: false

    # Distrobox path
    - name: Create container via distrobox assemble
      ansible.builtin.command:
        cmd: >-
          distrobox create
          --name {{ container_name }}
          --image {{ container_image }}
          --yes
      when:
        - _use_distrobox | bool
        - _container_exists.rc != 0
      changed_when: true

    # Toolbx path
    - name: Create container via toolbox
      ansible.builtin.command:
        cmd: >-
          toolbox create
          --container {{ container_name }}
          --distro {{ container_distro }}
          --release {{ container_release }}
      when:
        - _use_toolbox | bool
        - _container_exists.rc != 0
      changed_when: true

    # -----------------------------------------------------------------
    # 3. Start the container
    # -----------------------------------------------------------------
    - name: Start the container
      ansible.builtin.command:
        cmd: podman start {{ container_name }}
      register: _podman_start
      changed_when: true
      failed_when:
        - _podman_start.rc != 0
        - "'already running' not in (_podman_start.stderr | default(''))"

    # -----------------------------------------------------------------
    # 4. Detect Python and register with add_host
    # -----------------------------------------------------------------
    - name: Detect Python path inside container
      ansible.builtin.command:
        cmd: >-
          podman exec {{ container_name }}
          sh -c 'command -v python3 || command -v python || echo /usr/bin/python3'
      register: _container_python
      changed_when: false

    - name: Register container as Ansible host
      ansible.builtin.add_host:
        name: "{{ container_name }}"
        groups: containers
        ansible_connection: containers.podman.podman
        ansible_host: "{{ container_name }}"
        ansible_python_interpreter: "{{ _container_python.stdout | trim }}"
        ansible_remote_tmp: /tmp/.ansible/tmp

# =====================================================================
# Play 2: Provision inside the container via podman connection
# =====================================================================
- name: Configure development container
  hosts: containers
  connection: containers.podman.podman
  gather_facts: false

  vars:
    host_exec_commands:
      - podman
      - docker
      - flatpak

  tasks:
    # -----------------------------------------------------------------
    # 5. Bootstrap Python (needed before any Ansible module works)
    # -----------------------------------------------------------------
    - name: Bootstrap Python inside container
      ansible.builtin.raw: |
        if ! command -v python3 &>/dev/null; then
          dnf install -y python3 python3-dnf
        fi
      changed_when: false

    - name: Gather minimal facts
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "!min"
          - distribution

    # -----------------------------------------------------------------
    # 6. Install packages
    # -----------------------------------------------------------------
    - name: Install development packages
      ansible.builtin.dnf:
        name:
          - gcc
          - gcc-c++
          - clang
          - make
          - golang
          - python3-pip
          - nodejs
          - npm
          - git
          - vim
          - tmux
          - zsh
          - jq
          - fzf
          - direnv
          - curl
          - wget
          - tar
          - unzip
          - ShellCheck
          - yamllint
          - ripgrep
          - fd-find
          - buildah
          - skopeo
        state: present

    # -----------------------------------------------------------------
    # 7. Install binary downloads (oc, kubectl, grype)
    # -----------------------------------------------------------------
    - name: Check if oc is installed
      ansible.builtin.stat:
        path: /usr/local/bin/oc
      register: _oc_stat

    - name: Install oc + kubectl
      when: not _oc_stat.stat.exists
      block:
        - name: Download OpenShift client
          ansible.builtin.get_url:
            url: "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz"
            dest: /tmp/oc.tar.gz
            mode: "0644"

        - name: Extract oc and kubectl to /usr/local/bin
          ansible.builtin.unarchive:
            src: /tmp/oc.tar.gz
            dest: /usr/local/bin
            remote_src: true

        - name: Remove tarball
          ansible.builtin.file:
            path: /tmp/oc.tar.gz
            state: absent

    - name: Check if grype is installed
      ansible.builtin.stat:
        path: /usr/local/bin/grype
      register: _grype_stat

    - name: Install grype
      ansible.builtin.shell:
        cmd: >-
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh
          | sh -s -- -b /usr/local/bin
      args:
        creates: /usr/local/bin/grype
      when: not _grype_stat.stat.exists

    # -----------------------------------------------------------------
    # 8. Host command delegation
    # -----------------------------------------------------------------

    # Detect which tool created the container (check for distrobox-host-exec)
    - name: Check for distrobox-host-exec inside container
      ansible.builtin.stat:
        path: /usr/bin/distrobox-host-exec
      register: _host_exec_stat

    # Distrobox: symlink to distrobox-host-exec
    - name: Create distrobox-host-exec symlinks
      ansible.builtin.file:
        src: /usr/bin/distrobox-host-exec
        dest: "/usr/local/bin/{{ item }}"
        state: link
        force: true
      loop: "{{ host_exec_commands }}"
      when: _host_exec_stat.stat.exists

    # Toolbx: flatpak-spawn --host wrapper scripts
    - name: Deploy flatpak-spawn host wrappers
      ansible.builtin.copy:
        dest: "/usr/local/bin/{{ item }}"
        mode: "0755"
        content: |
          #!/bin/sh
          exec flatpak-spawn --host {{ item }} "$@"
      loop: "{{ host_exec_commands }}"
      when: not _host_exec_stat.stat.exists

    # -----------------------------------------------------------------
    # 9. Verify
    # -----------------------------------------------------------------
    - name: Verify oc installed
      ansible.builtin.command:
        cmd: oc version --client
      changed_when: false

    - name: Verify grype installed
      ansible.builtin.command:
        cmd: grype version
      changed_when: false

    - name: Verify host delegation
      ansible.builtin.command:
        cmd: /usr/local/bin/podman --version
      changed_when: false
      failed_when: false
      register: _host_podman_ver

    - name: Provisioning complete
      ansible.builtin.debug:
        msg: >-
          Container '{{ inventory_hostname }}' provisioned.
          Host podman: {{ _host_podman_ver.stdout | default('unavailable') | trim }}.
